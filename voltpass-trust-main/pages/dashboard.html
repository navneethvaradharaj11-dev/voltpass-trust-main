<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoltPass | Dashboard</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="../js/dashboard.js"></script>
  </head>
  <body>
    <header class="sticky top-0 z-40 border-b border-border/60 bg-background/70 backdrop-blur-xl">
      <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
        <a href="../" class="flex items-center gap-2">
          <span class="grid h-8 w-8 place-items-center rounded-lg bg-gradient-to-br from-primary to-electric-glow glow-electric">V</span>
          <span class="font-display text-lg font-bold tracking-tight">VoltPass</span>
        </a>
        <button data-logout class="rounded-md px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-accent hover:text-foreground">
          Logout
        </button>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <section class="glass-card rounded-2xl p-5">
        <div class="flex items-center gap-4">
          <img data-user-photo class="h-12 w-12 rounded-full border border-border" alt="" />
          <div>
            <h1 class="font-display text-3xl font-bold">Dashboard</h1>
            <p class="text-sm text-muted-foreground">
              Signed in as <span data-user-name>Google User</span> · <span data-user-email></span>
            </p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
